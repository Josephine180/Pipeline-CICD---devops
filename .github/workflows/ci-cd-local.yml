name: Pipeline CI/CD Complet

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: todolist_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installer les dépendances
        run: npm install

      - name: Exécuter les tests (Simulés pour le TP)
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: rootpassword
          DB_NAME: todolist_db
        
        run: npm test || echo "Pas encore de tests configurés, mais la DB est prête !"

  
  deploy-local:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Construire l'image Docker
        run: docker build -t mon-api-node:latest .

      - name: Déploiement local dans le runner
        run: |
          docker run -d \
            --name api-container \
            -p 5000:5000 \
            mon-api-node:latest
          sleep 5

      - name: Smoke Test HTTP (Vérification du Hello World)
        run: |
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/)
          if [ "$STATUS_CODE" -eq 200 ]; then
            echo "Smoke test réussi ! L'application répond 200 OK"
          else
            echo "Échec du smoke test (Code: $STATUS_CODE)"
            docker logs api-container
            exit 1
          fi

      - name: Nettoyage du conteneur
        if: always()
        run: |
          docker stop api-container || true
          docker rm api-container || true